version: "3.8"

services:
  aje-bot:
    image: ghcr.io/gustavocastilho-hub/aje-de-boxe:latest
    networks:
      - network_public
    environment:
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASS=${RABBITMQ_PASS}
      - RABBITMQ_VHOST=${RABBITMQ_VHOST}
      - RABBITMQ_QUEUE=${RABBITMQ_QUEUE}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - UAZAPI_BASE_URL=${UAZAPI_BASE_URL}
      - UAZAPI_TOKEN=${UAZAPI_TOKEN}
      - UAZAPI_INSTANCE=${UAZAPI_INSTANCE}
      - WEBHOOK_PATH=${WEBHOOK_PATH}
      - DEBOUNCE_SECONDS=${DEBOUNCE_SECONDS}
      - BLOCK_TTL_SECONDS=${BLOCK_TTL_SECONDS}
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"
        - "traefik.http.routers.aje-de-boxe.rule=Host(`webhook-whatsapp.strategicai.com.br`)"
        - "traefik.http.routers.aje-de-boxe.entrypoints=websecure"
        - "traefik.http.routers.aje-de-boxe.tls=true"
        - "traefik.http.routers.aje-de-boxe.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.aje-de-boxe.loadbalancer.server.port=8000"

networks:
  network_public:
    external: true
